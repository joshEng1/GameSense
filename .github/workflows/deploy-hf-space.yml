name: Deploy hf-space-clean to Hugging Face Space

on:
  push:
    branches:
      - hf-space-clean
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: hf-space-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout triggering commit
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Verify HF_TOKEN exists
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "HF_TOKEN is missing"
            exit 1
          fi

      - name: Sync to Hugging Face Space
        uses: huggingface/hub-sync@v0.1.0
        with:
          github_repo_id: ${{ github.repository }}
          huggingface_repo_id: joosshhuuaa/GameSense
          hf_token: ${{ secrets.HF_TOKEN }}
          repo_type: space
          space_sdk: docker
